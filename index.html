*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:         #0f1117;
  --surface:    #181c27;
  --surface2:   #1e2434;
  --border:     #252d40;
  --accent:     #818cf8;
  --accent2:    #6366f1;
  --text:       #e2e8f0;
  --text-dim:   #4a5578;
  --green:      #34d399;
  --header-bg:  #0b0e16;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  background: var(--header-bg);
  padding: 16px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}
.header-left { display: flex; flex-direction: column; }
.header-title {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
}
.header-sub {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 3px;
}
.header-actions { display: flex; gap: 8px; }
.btn-icon {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: background 0.15s;
}
.btn-icon:active { background: var(--border); }
.btn-icon.danger { color: #f87171; }

/* ── DATE STRIP ── */
.date-strip {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.date-label { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
.date-value { font-family: var(--mono); font-size: 12px; color: var(--accent); }
.dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border); }

/* ── TABLE HEAD ── */
.table-head {
  display: grid;
  grid-template-columns: 64px 88px 1fr;
  background: var(--header-bg);
  border-bottom: 2px solid var(--accent2);
}
.th {
  padding: 10px 12px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  border-right: 1px solid var(--border);
}
.th:last-child { border-right: none; }

/* ── ROWS ── */
.rows-container { padding-bottom: 100px; }
.row-item {
  display: grid;
  grid-template-columns: 64px 88px 1fr;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.cell {
  background: var(--surface);
  padding: 14px 12px;
  display: flex;
  align-items: center;
  border-right: 1px solid var(--border);
}
.cell-label {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}

/* ── KO INPUT ── */
.cell-ko {
  background: var(--surface);
  display: flex;
  align-items: stretch;
  border-right: 1px solid var(--border);
}
.ko-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--accent);
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  padding: 14px 8px;
  -webkit-appearance: none;
  cursor: pointer;
}
.ko-input::placeholder { color: var(--border); font-size: 14px; }
.ko-input:focus { background: rgba(129,140,248,0.08); }

/* ── NOTES CELL ── */
.cell-notes {
  background: var(--surface);
  padding: 12px 12px;
  cursor: pointer;
  position: relative;
  min-height: 52px;
  display: flex;
  align-items: center;
}
.cell-notes:active { background: var(--surface2); }
.notes-preview { font-size: 12px; color: var(--text-dim); line-height: 1.5; flex: 1; }
.notes-preview.has-notes { color: var(--text); }
.bullet-item { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 2px; }
.bullet-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: 6px;
  flex-shrink: 0;
}
.notes-count {
  position: absolute;
  top: 8px; right: 10px;
  background: var(--accent2);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  font-family: var(--mono);
  border-radius: 20px;
  padding: 1px 6px;
  min-width: 18px;
  text-align: center;
}
.add-note-hint {
  display: flex; align-items: center; gap: 6px;
  color: var(--text-dim);
  font-size: 12px;
}
.add-note-hint span { font-size: 16px; }

/* ── PCT ROW (BS) ── */
.pct-row {
  border-top: 2px solid var(--accent2);
}
.pct-row .cell,
.pct-row .cell-ko {
  background: #1a1c30;
}
.pct-wrap {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 14px 8px;
}
.pct-input {
  width: 64px !important;
  padding: 0 !important;
  font-size: 20px !important;
  text-align: right !important;
}
.pct-sign {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  margin-left: 3px;
}

/* ── TOTAL BAR ── */
.total-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--header-bg);
  border-top: 1px solid var(--border);
  padding: 12px 20px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
}
.total-label { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
.total-value { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--accent); }
.total-right { text-align: right; }

/* ── NOTE MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border);
  width: 100%;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 0;
}
.modal-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-label { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--accent); }
.modal-subtitle { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.modal-close {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 14px;
}
.modal-close:active { background: var(--border); }
.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  -webkit-overflow-scrolling: touch;
}

/* ── BULLET LIST ── */
.bullet-list { display: flex; flex-direction: column; gap: 8px; }
.bullet-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  animation: slideIn 0.15s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.bullet-marker { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.bullet-text-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.4;
  resize: none;
  min-height: 20px;
}
.bullet-text-input::placeholder { color: var(--text-dim); }
.bullet-delete {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 16px;
  padding: 0 2px;
  line-height: 1;
  flex-shrink: 0;
}
.bullet-delete:active { color: #f87171; }
.add-bullet-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--text-dim);
  font-family: var(--sans);
  font-size: 14px;
  cursor: pointer;
  width: 100%;
  margin-top: 4px;
  transition: all 0.15s;
}
.add-bullet-btn:active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

/* ── CONFIRM MODAL ── */
.confirm-modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}
.confirm-modal.open { opacity: 1; pointer-events: all; }
.confirm-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px 20px;
  max-width: 320px;
  width: 100%;
  text-align: center;
  color: var(--text);
}
.confirm-icon { font-size: 36px; margin-bottom: 12px; }
.confirm-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.confirm-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 10px; }
.btn-cancel {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  cursor: pointer;
}
.btn-cancel:active { background: var(--border); }
.btn-confirm {
  flex: 1;
  background: #dc2626;
  border: none;
  border-radius: 10px;
  padding: 12px;
  color: white;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.btn-confirm:active { opacity: 0.85; }

/* ── TOAST ── */
.toast {
  position: fixed;
  top: 80px; left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: var(--green);
  color: #0f1117;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 8px 16px;
  border-radius: 20px;
  opacity: 0;
  transition: all 0.2s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title">KO Report</div>
    <div class="header-sub">Riunione anomalie</div>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="copyReport()" title="Copia report">📋</button>
    <button class="btn-icon danger" onclick="openReset()" title="Reset">🗑</button>
  </div>
</div>

<div class="date-strip">
  <span class="date-label">Data</span>
  <span class="dot"></span>
  <span class="date-value" id="dateVal"></span>
</div>

<div class="table-head">
  <div class="th">UTE</div>
  <div class="th">KO</div>
  <div class="th">Note riunione</div>
</div>

<div class="rows-container" id="rowsContainer"></div>

<div class="total-bar">
  <div class="total-label">Totale KO</div>
  <div class="total-right">
    <div class="total-value" id="totalKo">0</div>
  </div>
</div>

<!-- NOTE MODAL -->
<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-label" id="modalLabel">—</div>
        <div class="modal-subtitle">Anomalie da riportare</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="bullet-list" id="bulletList"></div>
      <button class="add-bullet-btn" onclick="addBullet()">
        <span>＋</span> Aggiungi anomalia
      </button>
    </div>
  </div>
</div>

<!-- CONFIRM RESET MODAL -->
<div class="confirm-modal" id="confirmModal">
  <div class="confirm-box">
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-title">Reset completo?</div>
    <div class="confirm-sub">Tutti i KO e le note verranno cancellati. L'operazione non è reversibile.</div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeReset()">Annulla</button>
      <button class="btn-confirm" onclick="confirmReset()">Reset</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ Salvato</div>

<script>
const ROWS = ['71','Log','Vern','Trim','4','5','7/8','NF','BS'];
const PCT_ROW = 'BS';
const STORAGE_KEY = 'ko_report_v2';
let data = {};
let currentRow = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) data = JSON.parse(raw);
  } catch(e) {}
  ROWS.forEach(r => { if (!data[r]) data[r] = { ko: '', notes: [] }; });
}

function saveData(silent = false) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function copyReport() {
  const now = new Date();
  const dataStr = now.toLocaleDateString('it-IT', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
  const ora = now.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });

  let lines = [];
  lines.push(`*📋 REPORT KO — RIUNIONE ANOMALIE*`);
  lines.push(`📅 ${dataStr} — ore ${ora}`);
  lines.push('▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬');
  lines.push('');

  let totale = 0;
  ROWS.forEach(r => {
    if (r === PCT_ROW) return;
    const ko = data[r].ko;
    const notes = (data[r].notes || []).filter(n => n.trim());
    const koVal = ko !== '' ? ko : '—';
    if (ko !== '' && !isNaN(parseInt(ko))) totale += parseInt(ko);
    lines.push(`▸ *${r}*  →  KO: *${koVal}*`);
    notes.forEach(n => lines.push(`     • ${n}`));
  });

  lines.push('');
  lines.push('▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬');
  lines.push(`*TOTALE KO: ${totale}*`);

  const bs = data[PCT_ROW];
  if (bs && bs.ko !== '') {
    lines.push(`*BS (Buono Subito): ${bs.ko}%*`);
  }

  lines.push('');

  const testo = lines.join('\n');

  navigator.clipboard.writeText(testo).then(() => {
    showToast('📋 Copiato negli appunti!');
  }).catch(() => {
    // fallback per browser che bloccano clipboard
    const ta = document.createElement('textarea');
    ta.value = testo;
    ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('📋 Copiato negli appunti!');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function setDate() {
  const d = new Date().toLocaleDateString('it-IT', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
  document.getElementById('dateVal').textContent = d;
}

function renderRows() {
  const container = document.getElementById('rowsContainer');
  container.innerHTML = '';
  ROWS.forEach(label => {
    const row = document.createElement('div');
    // Label cell
    const c1 = document.createElement('div');
    c1.className = 'cell';
    c1.innerHTML = `<span class="cell-label">${label}</span>`;
    // KO / PCT cell
    const c2 = document.createElement('div');
    c2.className = 'cell-ko';

    if (label === PCT_ROW) {
      row.className = 'row-item pct-row';
      const wrap = document.createElement('div');
      wrap.className = 'pct-wrap';
      const inp = document.createElement('input');
      inp.type = 'number'; inp.inputMode = 'decimal';
      inp.className = 'ko-input pct-input';
      inp.placeholder = '—'; inp.step = '0.01'; inp.min = '0'; inp.max = '100';
      inp.value = data[label].ko !== '' ? data[label].ko : '';
      inp.addEventListener('input', function() {
        data[label].ko = this.value === '' ? '' : parseFloat(this.value) || 0;
        saveData(true);
      });
      inp.addEventListener('focus', function() { this.select(); });
      const sign = document.createElement('span');
      sign.className = 'pct-sign'; sign.textContent = '%';
      wrap.appendChild(inp); wrap.appendChild(sign);
      c2.appendChild(wrap);
      row.appendChild(c1); row.appendChild(c2);
    } else {
      row.className = 'row-item';
      const inp = document.createElement('input');
      inp.type = 'number'; inp.inputMode = 'numeric'; inp.pattern = '[0-9]*';
      inp.className = 'ko-input'; inp.placeholder = '—';
      inp.value = data[label].ko !== '' ? data[label].ko : '';
      inp.addEventListener('input', function() {
        data[label].ko = this.value === '' ? '' : parseInt(this.value) || 0;
        updateTotal(); saveData(true);
      });
      inp.addEventListener('focus', function() { this.select(); });
      c2.appendChild(inp);
      const c3 = document.createElement('div');
      c3.className = 'cell-notes';
      c3.addEventListener('click', () => openModal(label));
      renderNotesPreview(c3, label);
      row.appendChild(c1); row.appendChild(c2); row.appendChild(c3);
    }
    container.appendChild(row);
  });
  updateTotal();
}

function renderNotesPreview(cell, label) {
  cell.innerHTML = '';
  const notes = data[label].notes || [];
  if (notes.length === 0) {
    cell.innerHTML = `<div class="add-note-hint"><span>✎</span> Aggiungi note</div>`;
    return;
  }
  const div = document.createElement('div');
  div.className = 'notes-preview has-notes';
  notes.slice(0,2).forEach(n => {
    if (!n.trim()) return;
    const bi = document.createElement('div');
    bi.className = 'bullet-item';
    bi.innerHTML = `<div class="bullet-dot"></div><span>${n}</span>`;
    div.appendChild(bi);
  });
  if (notes.length > 2) {
    const more = document.createElement('div');
    more.style.cssText = 'font-size:10px;color:var(--text-dim);margin-top:2px;';
    more.textContent = `+${notes.length - 2} altre...`;
    div.appendChild(more);
  }
  cell.appendChild(div);
  const badge = document.createElement('div');
  badge.className = 'notes-count';
  badge.textContent = notes.length;
  cell.appendChild(badge);
}

function updateTotal() {
  let total = 0;
  ROWS.forEach(r => {
    if (r === PCT_ROW) return;
    const v = parseInt(data[r].ko);
    if (!isNaN(v)) total += v;
  });
  document.getElementById('totalKo').textContent = total;
}

function openModal(label) {
  currentRow = label;
  document.getElementById('modalLabel').textContent = label;
  renderBulletList();
  document.getElementById('noteModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('noteModal').classList.remove('open');
  document.body.style.overflow = '';
  if (currentRow) {
    document.querySelectorAll('.cell-notes').forEach(c => {
      if (c.closest('[data-row="' + currentRow + '"]') || true) {}
    });
    // refresh all note previews for current row
    renderRows();
  }
  saveData(true);
  currentRow = null;
}

document.getElementById('noteModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function renderBulletList() {
  const list = document.getElementById('bulletList');
  list.innerHTML = '';
  data[currentRow].notes.forEach((note, i) => addBulletRow(note, i));
}

function addBulletRow(text, idx) {
  const list = document.getElementById('bulletList');
  const row = document.createElement('div');
  row.className = 'bullet-row';
  const dot = document.createElement('div');
  dot.className = 'bullet-marker';
  const ta = document.createElement('textarea');
  ta.className = 'bullet-text-input';
  ta.placeholder = "Descrivi l'anomalia...";
  ta.value = text || ''; ta.rows = 1;
  ta.setAttribute('data-index', idx);
  ta.addEventListener('input', function() {
    data[currentRow].notes[parseInt(this.getAttribute('data-index'))] = this.value;
    autoResize(this);
  });
  ta.addEventListener('focus', () => setTimeout(() => ta.scrollIntoView({ behavior:'smooth', block:'center' }), 300));
  autoResize(ta);
  const del = document.createElement('button');
  del.className = 'bullet-delete'; del.textContent = '✕';
  del.addEventListener('click', function() {
    data[currentRow].notes.splice(parseInt(ta.getAttribute('data-index')), 1);
    renderBulletList();
  });
  row.appendChild(dot); row.appendChild(ta); row.appendChild(del);
  list.appendChild(row);
}

function addBullet() {
  data[currentRow].notes.push('');
  addBulletRow('', data[currentRow].notes.length - 1);
  setTimeout(() => {
    const inputs = document.querySelectorAll('.bullet-text-input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 50);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function openReset() { document.getElementById('confirmModal').classList.add('open'); }
function closeReset() { document.getElementById('confirmModal').classList.remove('open'); }
function confirmReset() {
  ROWS.forEach(r => { data[r] = { ko: '', notes: [] }; });
  saveData(true); renderRows(); closeReset();
  showToast('🗑 Reset completato');
}

loadData(); setDate(); renderRows();
document.addEventListener('focusout', () => saveData(true));
</script>
</body>
</html>
